name: build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  pull_request:

jobs:
  linux-amd64:
    name: Linux amd64 .so
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build shared library
        run: |
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -ldflags "-s -w" -o hi-on-json-linux-amd64.so .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi-on-json-linux-amd64
          path: |
            hi-on-json-linux-amd64.so
            hi-on-json-linux-amd64.h

  windows-amd64:
    name: Windows amd64 .dll
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up MinGW-w64
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Build shared library
        shell: powershell
        run: |
          go mod tidy
          $env:CGO_ENABLED="1"
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          go build -buildmode=c-shared -ldflags "-s -w" -o hi-on-json-windows-amd64.dll .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hi-on-json-windows-amd64
          path: |
            hi-on-json-windows-amd64.dll
            hi-on-json-windows-amd64.h

